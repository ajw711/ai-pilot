server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 404 에러 발생 시 처리
    error_page  404              /404.html;

    # 500, 502, 503, 504 서버 에러 발생 시 보여줄 정적 페이지 지정
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}
