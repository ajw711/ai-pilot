name: Frontend CI

on:
  push:
    branches:
      - main
      - develop
      - "feature/**"
    paths:
      - "frontend/**"

  pull_request:
    branches:
      - main
      - develop
    paths:
      - "frontend/**"

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ai-pilot-frontend

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      # 1. 소스코드 체크아웃
      - name: Checkout Repository
        uses: actions/checkout@v4

      # develop/main 에서만 Docker Build
      - name: Set up Docker Buildx
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: docker/setup-buildx-action@v3

      # main 브랜치에서만 GHCR 로그인
      - name: Login to GHCR
        if: github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Docker Image Metadata
      - name: Extract Docker metadata
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,format=short

      # Docker Build
      # develop : Build만
      # main    : Build + Push
      - name: Build and Push Docker Image
        if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Trigger CD (Infra Repository Dispatch)
        if: github.ref == 'refs/heads/main'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.INFRA_DEPLOY_TOKEN }}
          script: |
            const shortSha = 'sha-' + context.sha.substring(0, 7);

            await github.rest.repos.createDispatchEvent({
              owner: 'ajw711',
              repo: 'ai-pilot-infra',
              event_type: 'deploy-frontend-image-updated',
              client_payload: {
                tag: shortSha
              }
            })
