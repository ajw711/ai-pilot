spring:
  application:
    name: mcp-pilot

  ai:
    google:
      genai:
        api-key: ${GEMINI_API_KEY}
        model: gemini-1.5-pro

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.microsoft.sqlserver.jdbc.SQLServerDriver

  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.SQLServerDialect
